spring:
  application:
    name: submeter-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/submeter}
    username: ${SPRING_DATASOURCE_USERNAME:submeter}
    password: ${SPRING_DATASOURCE_PASSWORD:submeter_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    # Flyway owns the schema; Hibernate validates only
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        # Enables @JdbcTypeCode(SqlTypes.JSON) for JSONB columns without extra libs
        jdbc:
          time_zone: UTC
    open-in-view: false   # Prevent lazy-load anti-pattern through HTTP response phase

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: never   # Never leak stack traces in error responses
    include-stacktrace: never
    include-binding-errors: never

# ── Application-specific configuration ────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:0123456789012345678901234567890123456789} # Min 32 chars; app fails fast if missing
    access-token-expiry-ms: 604800000              # 7 days
    refresh-token-expiry-ms: 604800000             # 7 days

  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_TDlxd8rTABFHMd}
    key-secret: ${RAZORPAY_KEY_SECRET:7ybEuJh1ib2imbNMC7riH5b3}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}    # Optional in dev; required in prod

  billing:
    nightly-cron: ${BILLING_CRON:0 0 2 * * *}     # 02:00 UTC daily
    payment-due-days: 7                            # Days from invoice issue to due date
    past-due-retry-days: 3                         # Days before PAST_DUE → CANCELED

  storage:
    root-path: ${STORAGE_PATH:./storage}           # Local filesystem; swap for S3 via StorageProvider

  dev-mode: ${DEV_MODE:false}                      # Enables /dev/* endpoints (mock webhooks, email log)

  rate-limit:
    login-max-attempts: 5
    login-window-minutes: 15

  seeder:
    batch-size: ${SEEDER_BATCH_SIZE:500}

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.submeter: DEBUG
    org.flywaydb: INFO
